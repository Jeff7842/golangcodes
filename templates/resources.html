<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resources — Golang Codes</title>

    <meta name="description"
        content="Curated free Go resources, books, videos, and articles to continue your learning journey." />
    <meta name="theme-color" content="#00ADD8" />

    <link rel="icon" type="image/jpeg" href="/static/golangcodeslogo.jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        heading: ["Plus Jakarta Sans", "sans-serif"],
                    },
                    colors: {
                        goblue: {
                            50: "#f0f9ff",
                            100: "#e0f2fe",
                            400: "#29b6f6",
                            500: "#00ADD8",
                            600: "#007D9C",
                            700: "#005a70",
                        },
                    },
                },
            },
        };
    </script>

    <script>
        if (
            localStorage.theme === "dark" ||
            (!("theme" in localStorage) &&
                window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
            document.documentElement.classList.add("dark");
        }
    </script>

    <style>
        /* Markdown prose styling */
        .prose h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #00ADD8;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .prose h2 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .prose p {
            color: #94a3b8;
            line-height: 1.75;
            margin-bottom: 1rem;
        }

        .prose ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .prose li {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            transition: all 0.2s;
        }

        .prose li:hover {
            border-color: rgba(0, 173, 216, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        .prose a {
            color: #29b6f6;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }

        .prose a:hover {
            color: #00ADD8;
            text-decoration: underline;
        }

        .prose li a {
            font-size: 0.95rem;
        }

        /* Bare URLs (not wrapped in anchor tags) */
        .prose p a[href^="http"]:not([href*="github"]) {
            display: block;
            word-break: break-all;
        }

        .prose code {
            background: rgba(0, 173, 216, 0.1);
            border: 1px solid rgba(0, 173, 216, 0.15);
            color: #94a3b8;
            padding: 0.15rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen font-sans antialiased">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 border-b border-white/5 bg-slate-950/80 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <img src="/static/golangcodeslogo.jpeg" alt="Golang Codes"
                    class="w-9 h-9 rounded-lg shadow-lg group-hover:scale-105 transition-transform" />
                <span class="font-heading font-bold text-xl tracking-tight">
                    <span class="text-goblue-500">Golang</span><span class="text-slate-300">Codes</span>
                </span>
            </a>
            <div class="flex items-center gap-4">
                <a href="/"
                    class="hidden sm:flex text-slate-400 hover:text-white transition-colors text-sm font-medium">
                    Home
                </a>
                <a href="/go/Introduction"
                    class="bg-goblue-500 hover:bg-goblue-600 text-white font-semibold px-5 py-2.5 rounded-lg transition-all hover:shadow-lg hover:shadow-goblue-500/25 text-sm">
                    Open Reader
                </a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="pt-28 pb-4 md:pt-36 md:pb-6 relative">
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute top-20 left-10 w-72 h-72 bg-goblue-500/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-20 right-10 w-96 h-96 bg-goblue-500/5 rounded-full blur-3xl"></div>
        </div>

        <div class="relative max-w-3xl mx-auto px-6 text-center">
            <div
                class="inline-flex items-center gap-2 bg-green-500/10 border border-green-500/20 rounded-full px-4 py-1.5 mb-6">
                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                <span class="text-green-400 text-sm font-medium">Finished the book? Keep going.</span>
            </div>
        </div>
    </section>

    <!-- Rendered Markdown Content -->
    <section class="pb-20 md:pb-28">
        <div class="max-w-3xl mx-auto px-6">
            <article class="prose">
                {{.}}
            </article>
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <img src="/static/golangcodeslogo.jpeg" alt="Logo" class="w-7 h-7 rounded-lg" />
                <span class="text-slate-500 text-sm">&copy; 2025 Golang Codes. MIT License.</span>
            </div>
            <div class="flex items-center gap-6 text-sm">
                <a href="https://github.com/Golangcodes/golangcodes" target="_blank"
                    class="text-slate-500 hover:text-white transition-colors">GitHub</a>
                <a href="/go/Introduction" class="text-slate-500 hover:text-white transition-colors">Reader</a>
                <a href="https://buymeacoffee.com/hersi" target="_blank"
                    class="text-slate-500 hover:text-pink-400 transition-colors flex items-center gap-1">&#9829; Support
                    Us</a>
            </div>
        </div>
    </footer>

    <script>
        // Convert YouTube links to embeds
        document.querySelectorAll('.prose a').forEach(a => {
            const href = a.href;
            let videoId = null;

            const shortMatch = href.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
            const longMatch = href.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/);
            if (shortMatch) videoId = shortMatch[1];
            else if (longMatch) videoId = longMatch[1];

            if (!videoId) return;

            // Check if this link also has a playlist
            const listMatch = href.match(/[?&]list=([a-zA-Z0-9_-]+)/);
            let src = `https://www.youtube-nocookie.com/embed/${videoId}`;
            if (listMatch) src += `?list=${listMatch[1]}`;

            const wrapper = document.createElement('div');
            wrapper.className = 'my-4 rounded-xl overflow-hidden border border-white/10';
            wrapper.style.aspectRatio = '16/9';

            const iframe = document.createElement('iframe');
            iframe.src = src;
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
            iframe.style.cssText = 'width:100%;height:100%;border:none;';

            wrapper.appendChild(iframe);

            // Replace the link (or its parent <p> if the link is the only child)
            const parent = a.parentElement;
            if (parent.tagName === 'P' && parent.childNodes.length === 1) {
                parent.replaceWith(wrapper);
            } else {
                a.replaceWith(wrapper);
            }
        });
    </script>
</body>

</html>
