<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive PDF Reader — Golang Codes</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Learn Go interactively with a PDF-based reader, integrated code editor, and note-taking workspace." />
    <meta name="theme-color" content="#00ADD8" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        heading: ["Plus Jakarta Sans", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    colors: {
                        goblue: {
                            50: "#f0f9ff",
                            100: "#e0f2fe",
                            500: "#00ADD8",
                            600: "#007D9C",
                        },
                    },
                },
            },
        };

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="/static/idb-store.js"></script>

    <!-- Monaco Editor CSS -->
    <link rel="stylesheet" data-name="vs/editor/editor.main"
        href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css" />

    <style>
        .pdf-page-wrapper {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            background: white;
            position: relative;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        body {
            height: 100vh;
            overflow: hidden;
        }

        #pdf-canvas-container {
            background-color: #525659;
            overflow: auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .highlight {
            position: absolute;
            background-color: rgba(255, 255, 0, 0.4);
            mix-blend-mode: multiply;
        }

        #editor {
            min-height: 200px;
        }

        .pane-divider-v {
            width: 4px;
            cursor: col-resize;
            background: #e2e8f0;
            transition: background 0.2s;
        }

        .dark .pane-divider-v {
            background: #1e293b;
        }

        .pane-divider-v:hover {
            background: #3b82f6;
        }

        .pane-divider-h {
            height: 4px;
            cursor: row-resize;
            background: #e2e8f0;
            transition: background 0.2s;
        }

        .dark .pane-divider-h {
            background: #1e293b;
        }

        .pane-divider-h:hover {
            background: #3b82f6;
        }

        .notes-textarea {
            background-image: repeating-linear-gradient(transparent, transparent 31px, #e2e8f0 31px, #e2e8f0 32px);
            line-height: 32px;
            padding: 8px 16px;
        }

        .dark .notes-textarea {
            background-image: repeating-linear-gradient(transparent, transparent 31px, #334155 31px, #334155 32px);
        }

        /* PDF.js Text Layer */
        .textLayer {
            position: absolute;
            text-align: initial;
            inset: 0;
            overflow: hidden;
            opacity: 0.2;
            line-height: 1;
            text-rendering: optimizeLegibility;
        }

        .textLayer span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
        }

        #text-selection-toolbar {
            display: none;
            position: fixed;
            z-index: 1000;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 4px;
        }

        .dark #text-selection-toolbar {
            background: #1e293b;
            border-color: #334155;
        }
    </style>

    <script>
        if (localStorage.getItem("theme") === "dark" || (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
        }
    </script>
</head>

    <script>
        // PDF-Centric App Logic
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let scale = 1.5;
        let currentPDFHash = null;
        let currentPage = 1;
        const container = document.getElementById('pdf-canvas-container');
        const toolbar = document.getElementById('text-selection-toolbar');

        async function generateHash(input) {
            if (input instanceof Blob) {
                return `file_${input.name.replace(/[^a-zA-Z0-9]/g, '_')}_${input.size}`;
            }
            if (typeof input === 'string') {
                if (input.startsWith('blob:')) return currentPDFHash;
                return input.split('/').pop().replace(/[^a-zA-Z0-9]/g, '_');
            }
            return 'unknown_pdf';
        }

        async function loadPDF(param, forceHash = null) {
            let url = null;
            let blob = param instanceof Blob ? param : null;
            let title = "External PDF";
            let hash = forceHash;

            if (blob) {
                url = URL.createObjectURL(blob);
                title = blob.name || "Uploaded PDF";
                if (!hash) hash = await generateHash(blob);
            } else if (typeof param === 'string') {
                if (!param.includes('/') && !param.includes(':')) {
                    // It's a hash from library
                    hash = param;
                    const doc = await window.ReaderDB.get('pdfs', hash);
                    if (doc) {
                        if (doc.blob) {
                            url = URL.createObjectURL(doc.blob);
                        } else {
                            url = doc.path;
                        }
                        title = doc.title;
                    }
                } else {
                    url = param;
                    if (!hash) hash = await generateHash(url);
                }
            }

            if (!url) {
                console.error("Could not resolve PDF URL from", param);
                return;
            }

            document.getElementById('pdf-name').textContent = "Loading...";
            currentPDFHash = hash;

            try {
                if (!window.ReaderDB.db) await window.ReaderDB.init();

                pdfDoc = await pdfjsLib.getDocument(url).promise;

                // Auto-crop / Fit to width
                const page1 = await pdfDoc.getPage(1);
                const baseViewport = page1.getViewport({ scale: 1.0 });
                const containerWidth = document.getElementById('pdf-canvas-container').clientWidth;
                if (containerWidth > 100) {
                    scale = (containerWidth - 40) / baseViewport.width;
                }

                if (url.includes('AnIntroduction')) title = "An Introduction to Programming in Go";
                document.getElementById('pdf-name').textContent = title;

                // Save to IndexedDB
                const pdfData = {
                    hash: currentPDFHash,
                    title: title,
                    path: url.startsWith('http') || url.startsWith('/') ? url : null,
                    blob: blob,
                    last_updated: Date.now()
                };

                // If we're loading from a hash, don't overwrite the blob if we don't have a new one
                if (!blob && !url.startsWith('http') && !url.startsWith('/')) {
                    const existing = await window.ReaderDB.get('pdfs', currentPDFHash);
                    if (existing && existing.blob) pdfData.blob = existing.blob;
                }

                await window.ReaderDB.put('pdfs', pdfData);
                await updateLibrarySidebar();

                // Fetch notes/highlights/bookmarks from IndexedDB
                const noteObj = await window.ReaderDB.get('notes', [currentPDFHash, 1]); // Global note
                const highlights = await window.ReaderDB.getAllByIndex('highlights', 'pdf_hash', currentPDFHash);
                const bookmarks = await window.ReaderDB.getAllByIndex('bookmarks', 'pdf_hash', currentPDFHash);

                document.getElementById('page-info').textContent = `1 / ${pdfDoc.numPages}`;

                // Apply notes and scratchpad code
                document.getElementById('notes-ta').value = noteObj ? noteObj.content : '';

                const scratchObj = await window.ReaderDB.get('notes', [currentPDFHash, 'scratchpad']);
                if (window.editor) {
                    window.editor.setValue(scratchObj && scratchObj.content.trim() !== '' ? scratchObj.content : 'package main\n\nimport "fmt"\n\nfunc main() {\n\t// Type your Go examples here and hit Run!\n\tfmt.Println("Hello, Go Reader!")\n}');
                }

                renderAllPages(highlights);
                loadOutline();
                updateBookmarksSidebar(bookmarks.map(x => x.page));
            } catch (err) {
                console.error("PDF Load Error:", err);
                document.getElementById('pdf-name').textContent = "Error loading PDF";
            }
        }

        async function renderAllPages(highlights = []) {
            container.innerHTML = '';
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const pageNum = parseInt(entry.target.dataset.pageNumber);
                        currentPage = pageNum;
                        document.getElementById('page-info').textContent = `${pageNum} / ${pdfDoc.numPages}`;
                        trackPage(pageNum);
                        updateBookmarkIcon(pageNum);
                    }
                });
            }, { threshold: 0.5 });

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale });

                const wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                wrapper.id = `page-wrapper-${i}`;
                wrapper.dataset.pageNumber = i;

                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                wrapper.appendChild(canvas);
                observer.observe(wrapper);

                const highlightLayer = document.createElement('div');
                highlightLayer.className = 'highlight-layer';
                highlightLayer.style.width = `${viewport.width}px`;
                highlightLayer.style.height = `${viewport.height}px`;
                wrapper.appendChild(highlightLayer);

                // Add text layer for selection
                const textLayer = document.createElement('div');
                textLayer.className = 'textLayer'; // PDF.js default class
                textLayer.style.width = `${viewport.width}px`;
                textLayer.style.height = `${viewport.height}px`;
                textLayer.style.position = 'absolute';
                textLayer.style.top = '0';
                textLayer.style.left = '0';
                wrapper.appendChild(textLayer);

                container.appendChild(wrapper);

                const renderContext = { canvasContext: canvas.getContext('2d'), viewport };
                await page.render(renderContext).promise;

                // Render text for selection
                const textContent = await page.getTextContent();
                pdfjsLib.renderTextLayer({
                    textContent,
                    container: textLayer,
                    viewport,
                    textDivs: []
                });

                // Render existing highlights
                highlights.filter(h => h.page === i).forEach(h => renderHighlight(h, highlightLayer));
            }
        }

        async function trackPage(pageNum) {
            if (window.ReaderDB.db) {
                const pdf = await window.ReaderDB.get('pdfs', currentPDFHash);
                if (pdf) {
                    pdf.current_page = pageNum;
                    pdf.zoom = scale;
                    await window.ReaderDB.put('pdfs', pdf);
                }
            }
            // Optional: keep backend sync
            fetch('/api/pdf/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pdf_hash: currentPDFHash, page: pageNum, zoom: scale })
            });
        }

        async function toggleBookmark() {
            const isBookmarked = document.getElementById('bookmark-page-btn').classList.contains('text-yellow-500');
            const pageNum = currentPage;

            if (isBookmarked) {
                await window.ReaderDB.deleteBookmark(currentPDFHash, pageNum);
                await fetch(`/api/pdf/bookmarks?hash=${currentPDFHash}&page=${pageNum}`, { method: 'DELETE' });
                document.getElementById('bookmark-page-btn').classList.remove('text-yellow-500');
                document.getElementById('bookmark-page-btn').classList.add('text-slate-400');
            } else {
                await window.ReaderDB.put('bookmarks', { pdf_hash: currentPDFHash, page: pageNum });
                await fetch('/api/pdf/bookmarks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pdf_hash: currentPDFHash, page: pageNum })
                });
                document.getElementById('bookmark-page-btn').classList.add('text-yellow-500');
                document.getElementById('bookmark-page-btn').classList.remove('text-slate-400');
            }

            // Refresh sidebar
            const bookmarks = await window.ReaderDB.getAllByIndex('bookmarks', 'pdf_hash', currentPDFHash);
            updateBookmarksSidebar(bookmarks.map(x => x.page));
        }

        async function updateLibrarySidebar() {
            if (!window.ReaderDB.db) await window.ReaderDB.init();
            const el = document.getElementById('pdf-library');
            const pdfs = await window.ReaderDB.getAll('pdfs');
            if (!pdfs || pdfs.length === 0) {
                el.innerHTML = '<p class="text-slate-400 italic text-xs px-2">Library empty</p>';
                return;
            }
            el.innerHTML = '';
            pdfs.sort((a, b) => b.last_updated - a.last_updated).forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-2 py-1 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 flex items-center gap-2 truncate text-[10px]";
                btn.innerHTML = `<svg class="w-3 h-3 text-goblue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg> ${p.title}`;
                btn.onclick = () => loadPDF(p.hash);
                el.appendChild(btn);
            });
        }

        async function updateBookmarkIcon(pageNum) {
            const bookmarks = await window.ReaderDB.getAllByIndex('bookmarks', 'pdf_hash', currentPDFHash);
            if (bookmarks && bookmarks.some(x => x.page === pageNum)) {
                document.getElementById('bookmark-page-btn').classList.add('text-yellow-500');
                document.getElementById('bookmark-page-btn').classList.remove('text-slate-400');
            } else {
                document.getElementById('bookmark-page-btn').classList.remove('text-yellow-500');
                document.getElementById('bookmark-page-btn').classList.add('text-slate-400');
            }
        }

        function updateBookmarksSidebar(bookmarks) {
            const el = document.getElementById('pdf-bookmarks');
            if (!bookmarks || bookmarks.length === 0) {
                el.innerHTML = '<p class="text-slate-400 italic text-xs px-2">No bookmarks</p>';
                return;
            }
            el.innerHTML = '';
            bookmarks.sort((a, b) => a - b).forEach(p => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-2 py-1 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 flex items-center gap-2";
                btn.innerHTML = `<svg class="w-3 h-3 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg> Page ${p}`;
                btn.onclick = () => scrollToPageNum(p);
                el.appendChild(btn);
            });
        }

        function scrollToPageNum(p) {
            const target = document.getElementById(`page-wrapper-${p}`);
            if (target) target.scrollIntoView({ behavior: 'smooth' });
        }

        function renderHighlight(h, layer) {
            const rects = JSON.parse(h.rect_json);
            rects.forEach(r => {
                const div = document.createElement('div');
                div.className = 'highlight';
                div.style.left = `${r.left}px`;
                div.style.top = `${r.top}px`;
                div.style.width = `${r.width}px`;
                div.style.height = `${r.height}px`;
                div.style.backgroundColor = h.color || 'rgba(255, 255, 0, 0.4)';
                layer.appendChild(div);
            });
        }

        // Selection Handling
        document.addEventListener('mouseup', (e) => {
            const selection = window.getSelection();
            if (selection.toString().trim().length > 0) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                toolbar.style.display = 'flex';
                toolbar.style.top = `${rect.top - 40}px`;
                toolbar.style.left = `${rect.left}px`;
            } else {
                toolbar.style.display = 'none';
            }
        });

        async function highlightSelection() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            const rects = Array.from(range.getClientRects());

            // Find which page this is on
            const container = range.commonAncestorContainer.parentElement;
            const wrapper = container.closest('.pdf-page-wrapper');
            if (!wrapper) return;

            const pageNum = parseInt(wrapper.dataset.pageNumber);
            const wrapperRect = wrapper.getBoundingClientRect();

            const savedRects = rects.map(r => ({
                top: r.top - wrapperRect.top,
                left: r.left - wrapperRect.left,
                width: r.width,
                height: r.height
            }));

            const highlight = {
                pdf_hash: currentPDFHash,
                page: pageNum,
                rect_json: JSON.stringify(savedRects),
                color: 'rgba(255, 255, 0, 0.4)',
                content: selection.toString()
            };

            await window.ReaderDB.put('highlights', highlight);

            await fetch('/api/pdf/highlights', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(highlight)
            });

            renderHighlight(highlight, wrapper.querySelector('.highlight-layer'));
            selection.removeAllRanges();
            toolbar.style.display = 'none';
        }

        function extractSelectionToEditor() {
            const text = window.getSelection().toString();
            if (window.editor) {
                const current = window.editor.getValue();
                window.editor.setValue(current + "\n\n// Extracted:\n" + text);
            }
            toolbar.style.display = 'none';
            window.getSelection().removeAllRanges();
        }

        // Auto-scan feature removed. User is encouraged to manually type examples.

        async function loadOutline() {
            const outline = await pdfDoc.getOutline();
            const outlineEl = document.getElementById('pdf-outline');
            outlineEl.innerHTML = '';
            if (outline && outline.length > 0) {
                renderOutlineItems(outline, outlineEl, 0);
            } else {
                outlineEl.innerHTML = '<p class="text-slate-400 italic text-xs px-2">No outline found</p>';
            }
        }

        function renderOutlineItems(items, container, depth) {
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-2 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 block transition-colors text-xs`;
                btn.style.paddingLeft = `${(depth + 1) * 0.5}rem`;
                btn.textContent = (item.items && item.items.length > 0 ? (item.open ? '▼ ' : '▶ ') : '') + item.title;
                btn.onclick = () => scrollToPage(item);
                container.appendChild(btn);
                if (item.items && item.items.length > 0) {
                    renderOutlineItems(item.items, container, depth + 1);
                }
            });
        }

        async function scrollToPage(item) {
            let dest = item.dest;
            if (typeof dest === 'string') dest = await pdfDoc.getDestination(dest);
            const pageNum = await pdfDoc.getPageIndex(dest[0]) + 1;
            const el = document.getElementById(`page-wrapper-${pageNum}`);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        }

        // Resizing Logic
        const resizerV = document.getElementById('resize-v');
        const workspace = document.getElementById('workspace');
        let isResizingV = false;

        resizerV.addEventListener('mousedown', () => isResizingV = true);
        document.addEventListener('mousemove', (e) => {
            if (!isResizingV) return;
            const width = window.innerWidth - e.clientX;
            if (width > 300 && width < 800) {
                workspace.style.width = `${width}px`;
                if (window.editor) window.editor.layout();
            }
        });

        const resizerH = document.getElementById('resize-h');
        const editorBox = document.getElementById('editor-container');
        let isResizingH = false;

        resizerH.addEventListener('mousedown', () => isResizingH = true);
        document.addEventListener('mousemove', (e) => {
            if (!isResizingH) return;
            const workspaceRect = workspace.getBoundingClientRect();
            const height = workspaceRect.bottom - e.clientY;
            if (height > 100 && height < workspaceRect.height - 100) {
                editorBox.style.height = `${height}px`;
                if (window.editor) window.editor.layout();
            }
        });

        document.addEventListener('mouseup', () => {
            isResizingV = false;
            isResizingH = false;
        });

        // Debounced Auto-Save for Notes
        const notesTextArea = document.getElementById('notes-ta');
        const notesStatus = document.getElementById('notes-status');
        let notesSaveTimeout;

        notesTextArea.addEventListener('input', () => {
            notesStatus.textContent = 'Saving...';
            notesStatus.classList.add('text-blue-500');
            clearTimeout(notesSaveTimeout);

            notesSaveTimeout = setTimeout(async () => {
                if (!currentPDFHash) return;

                const notes = notesTextArea.value;
                await window.ReaderDB.put('notes', {
                    pdf_hash: currentPDFHash,
                    page: 1, // Global notes
                    content: notes,
                    updated_at: Date.now()
                });

                // Optional: sync to backend
                fetch('/api/pdf/notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pdf_hash: currentPDFHash,
                        page: 1,
                        content: notes
                    })
                }).catch(e => console.error("Sync error:", e));

                notesStatus.textContent = 'Saved ✓';
                notesStatus.classList.remove('text-blue-500');
            }, 800);
        });

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const margin = 20;
            let cursorY = 20;
            const pageWidth = doc.internal.pageSize.width;

            // Title Banner
            doc.setFillColor(0, 173, 216); // Go Blue
            doc.rect(0, 0, pageWidth, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.setFont("helvetica", "bold");
            doc.text("Study Guide & Export", margin, 26);

            cursorY = 55;
            doc.setTextColor(50, 50, 50);
            doc.setFontSize(16);
            doc.setFont("helvetica", "normal");
            doc.text("Document: " + document.getElementById('pdf-name').textContent, margin, cursorY);
            cursorY += 15;

            const drawHeader = (title) => {
                if (cursorY > 260) { doc.addPage(); cursorY = 20; }
                doc.setDrawColor(200, 200, 200);
                doc.line(margin, cursorY - 5, pageWidth - margin, cursorY - 5);
                doc.setFontSize(14);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(0, 173, 216);
                doc.text(title, margin, cursorY + 2);
                cursorY += 12;
                doc.setFont("helvetica", "normal");
                doc.setTextColor(50, 50, 50);
            };

            // Notes
            const noteObj = await window.ReaderDB.get('notes', [currentPDFHash, 1]);
            if (noteObj && noteObj.content.trim() !== '') {
                drawHeader("Personal Notes (Global)");
                doc.setFontSize(11);
                const splitNotes = doc.splitTextToSize(noteObj.content, pageWidth - margin * 2);
                if (cursorY + (splitNotes.length * 5) > 280) { doc.addPage(); cursorY = 20; }
                doc.text(splitNotes, margin, cursorY);
                cursorY += (splitNotes.length * 5) + 10;
            }

            // Highlights
            const highlights = await window.ReaderDB.getAllByIndex('highlights', 'pdf_hash', currentPDFHash);
            if (highlights && highlights.length > 0) {
                drawHeader("Highlighted Concepts");
                doc.setFontSize(10);
                highlights.forEach(h => {
                    const hText = `• [Page ${h.page}]: ${h.content}`;
                    const splitH = doc.splitTextToSize(hText, pageWidth - margin * 2);
                    if (cursorY + (splitH.length * 5) > 280) { doc.addPage(); cursorY = 20; }
                    doc.text(splitH, margin, cursorY);
                    cursorY += (splitH.length * 5) + 4;
                });
                cursorY += 6;
            }

            // Extracted Code Snippets removed. Rendering Scratchpad only.

            // Editor Scratchpad
            if (window.editor && window.editor.getValue().trim() !== '') {
                drawHeader("Scratchpad Code");
                doc.setFontSize(9);
                doc.setFont("courier", "normal");
                doc.setTextColor(30, 30, 30);
                const codeText = window.editor.getValue();
                const splitCode = doc.splitTextToSize(codeText, pageWidth - margin * 2);
                if (cursorY + (splitCode.length * 4) > 280) { doc.addPage(); cursorY = 20; }
                doc.text(splitCode, margin, cursorY);
            }

            doc.save(`GolangCodes_StudyGuide_${document.getElementById('pdf-name').textContent.replace(/\s+/g, '_')}.pdf`);
            alert("Study Guide exported successfully!");
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPDF('/static/AnIntroductionToProgrammingInGo.pdf');
            document.getElementById('export-pdf-btn').onclick = exportToPDF;
            document.getElementById('bookmark-page-btn').onclick = toggleBookmark;

            // Page Navigation
            document.getElementById('next-page-btn').onclick = () => {
                const next = container.querySelector(`[data-page-number="${currentPage + 1}"]`);
                if (next) {
                    next.scrollIntoView({ behavior: 'smooth' });
                    currentPage++;
                }
            };
            document.getElementById('prev-page-btn').onclick = () => {
                const prev = container.querySelector(`[data-page-number="${currentPage - 1}"]`);
                if (prev) {
                    prev.scrollIntoView({ behavior: 'smooth' });
                    currentPage--;
                }
            };

            // Monaco
            require(['vs/editor/editor.main'], function () {
                window.editor = monaco.editor.create(document.getElementById('editor'), {
                    value: 'package main\n\nimport "fmt"\n\nfunc main() {\n\t// Type your Go examples here and hit Run!\n\tfmt.Println("Hello, Go Reader!")\n}',
                    language: 'go',
                    theme: document.documentElement.classList.contains('dark') ? 'vs-dark' : 'vs',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    fontSize: 12,
                    fontFamily: 'JetBrains Mono, monospace'
                });

                let saveTimeout;
                window.editor.onDidChangeModelContent(() => {
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(async () => {
                        if (currentPDFHash) {
                            await window.ReaderDB.put('notes', {
                                pdf_hash: currentPDFHash,
                                page: 'scratchpad',
                                content: window.editor.getValue(),
                                updated_at: Date.now()
                            });
                        }
                    }, 500); // Debounce saves by 500ms
                });
            });

            // Run Code
            document.getElementById('run-btn').onclick = async () => {
                if (!window.editor) return;
                const code = window.editor.getValue();
                const output = document.getElementById('output');
                const loading = document.getElementById('loading');

                loading.style.display = 'flex';
                output.innerHTML = '<pre class="whitespace-pre-wrap font-mono text-sm text-slate-400">Compiling...</pre>';

                try {
                    const resp = await fetch('/api/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'code=' + encodeURIComponent(code)
                    });
                    output.innerHTML = await resp.text();
                } catch (err) {
                    output.innerHTML = '<pre class="whitespace-pre-wrap font-mono text-sm text-red-400">Network error: ' + err.message + '</pre>';
                } finally {
                    loading.style.display = 'none';
                }
            };

            // Theme toggle
            document.getElementById('theme-toggle').onclick = () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                if (window.editor) monaco.editor.setTheme(isDark ? 'vs-dark' : 'vs');
            };

            // Zoom
            document.getElementById('zoom-in').onclick = () => { scale += 0.2; renderAllPages(); document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%'; };
            document.getElementById('zoom-out').onclick = () => { if (scale > 0.5) { scale -= 0.2; renderAllPages(); document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%'; } };

            // Upload
            document.getElementById('upload-btn').onclick = () => document.getElementById('pdf-upload').click();
            document.getElementById('pdf-upload').onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    loadPDF(file);
                }
            };
        });
    </script>
</body>

</html>
